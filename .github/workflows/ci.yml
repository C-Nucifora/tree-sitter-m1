name: CI

on:
  push:
    branches: [main, features/**]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Least-privilege default for the whole workflow; jobs opt into more as needed.
permissions:
  contents: read

# Cancel superseded runs of the same branch/PR: every push otherwise queues
# a full duplicate job matrix (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --verbose

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  lua-fmt:
    name: Lua Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ after/

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # audit-check posts results as a check run
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  # The real-vehicle corpus gate (scripts/check-corpus.sh) is local-only: the
  # EV-M1 corpus is not available on GitHub runners, and the job that used to
  # run it here passed vacuously on zero files (#51). The script now refuses
  # to pass with no corpus; run it locally before a grammar release. The
  # Corpus job below runs the grammar's own committed corpus (test/corpus/)
  # instead — a real gate CI can actually evaluate (#52). (The job name is
  # also a required status-check context on main.)

  corpus:
    name: Corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tree-sitter test

  grammar:
    name: Grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The committed generated artifacts (src/parser.c, node-types.json,
      # grammar.json) are the deliverable; they must match grammar.js +
      # tree-sitter.json exactly (#52). Mirrors m1-core's kind_rs_is_fresh.
      - name: Generated parser is fresh
        run: |
          npx tree-sitter generate
          git diff --exit-code -- src/

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Keep in sync with `rust-version` in Cargo.toml (m1-tools#23).
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
