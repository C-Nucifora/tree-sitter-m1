name: Release tag

# Auto-creates the git tag (and a GitHub Release for visibility) whenever the
# crate version in Cargo.toml changes. tree-sitter-m1 is a library crate
# consumed via Cargo git-tag deps (built from source), so NO binaries are
# attached — the deliverable is the tag itself. This closes the "bumped the
# version but forgot to push the tag" gap, so downstream consumers can always
# resolve `tag = "vX.Y.Z"`.
#
# Idempotent: if the release for the current Cargo.toml version already exists,
# it does nothing. Runnable manually (workflow_dispatch) to recover a dropped
# push webhook. The version is read from Cargo.toml [package].version (the
# canonical source; Cargo.lock just mirrors it).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag + release on version change
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          TAG="v$VERSION"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          echo "Creating $TAG (tag + release) at $GITHUB_SHA"
          # Body: auto-generated "What's Changed" (PR list + full changelog
          # link) followed by a consume/install snippet. PR titles may contain
          # backticks, so the generated half never passes through an unquoted
          # heredoc; the static half is a quoted heredoc with placeholders
          # substituted afterwards.
          gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish="$GITHUB_SHA" \
            -q .body > body.md || echo "_Generated notes unavailable._" > body.md
          cat >> body.md <<'NOTES'

          ## Consume

          Source-only release — the git tag is the deliverable; Cargo builds it from source:

          ```toml
          [dependencies]
          tree-sitter-m1 = { git = "https://github.com/{{REPO}}", tag = "{{TAG}}" }
          ```

          Editors do not consume this repo directly: nvim-m1 self-provisions the grammar via nvim-treesitter, and m1-vscode highlights via TextMate + LSP semantic tokens.
          NOTES
          sed -i "s|{{REPO}}|$GITHUB_REPOSITORY|g; s|{{TAG}}|$TAG|g" body.md
          # If the tag already exists, gh attaches the release to it; otherwise
          # it creates the tag at the current commit.
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "tree-sitter-m1 $TAG" \
            --notes-file body.md
